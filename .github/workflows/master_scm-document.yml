# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build, test, lint and deploy - scm-document

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore GestorDocumentoApp.sln

      - name: Lint (format + whitespace)
        run: dotnet format GestorDocumentoApp.sln --verify-no-changes --no-restore --severity warn

      - name: Static analysis build (warnings as errors)
        run: dotnet build GestorDocumentoApp.sln --configuration Release --no-restore /p:EnableNETAnalyzers=true /p:AnalysisLevel=latest /warnaserror

      - name: Run tests
        run: dotnet test GestorDocumentoApp.sln --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: dotnet publish
        run: dotnet publish GestorDocumentoApp/GestorDocumentoApp.csproj -c Release --no-build -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_534741938ADA4F2E9A69FEDDEBF295AC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6D5B217D450D41F0ACE24FCA51BDACBB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_09247C18BF3D40EBB82906B3B9531A98 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'scm-document'
          slot-name: 'Production'
          package: .
          